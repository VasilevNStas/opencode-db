name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  id-token: write   # needed for PyPI trusted publishing

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Build wheel + source distribution
        run: |
          pip install build
          python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@v1.14.0
        # Uses trusted publishing (OIDC) — no API token needed.
        # Setup: https://pypi.org/manage/account/publishing/
        #   PyPI project: opencode-db
        #   Owner: VasilevNStas
        #   Repository: opencode-db
        #   Workflow: release.yml

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: dist/opencode_db-*.whl
